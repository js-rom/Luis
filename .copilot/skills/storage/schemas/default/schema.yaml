name: my-workflow
version: 1
description: Default OpenSpec workflow - vision → use-case
artifacts:
  - id: Vision and Business Case
    generates: vision.md
    description: Describes the high-level goals and constraints, the business case, and provides an executive summary.
    template: vision.md
    instruction: >
    requires: []
  - id: Use Case Model
    generates: UC{{#}}.md
    description: Describe the functional requirements.
    template: use-case.md
    instruction: >
    - Use Cockburn use-case structure: Title, Goal, Scope, Level, Actors, Preconditions, Trigger, Main Success Scenario, Extensions, Postconditions, Business Rules.
    - Write in English.
    - Main Success Scenario should have 10-20 numbered steps.
    - Extensions should be listed as alternate step sequences (no Given/When/Then).
    - Include explicit validation and error handling steps where applicable.
    - Use the template at openspec/iterations/inception-2026-04-13/use-cases/UC00 Template.md.
    requires: [vision.md]
